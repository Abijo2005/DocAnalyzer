version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Map host directories to container directories to persist uploads and vectorDB
      - ./backend/uploads:/workspace/uploads
      - ./backend/chroma_db:/workspace/chroma_db
      - ./backend/logs:/workspace/logs
    restart: always
    networks:
      - rag-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge
