name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Ruff Lint & Format Checks
      run: |
        # Run ruff checking on app folder
        python -m ruff check backend/app

    - name: Run Mypy Type Verification
      run: |
        # Run static typings validations
        python -m mypy --config-file backend/pyproject.toml backend/app

    - name: Run Automated Tests
      run: |
        # Run pytest inside the backend directory to align with pyproject.toml paths
        cd backend
        python -m pytest
